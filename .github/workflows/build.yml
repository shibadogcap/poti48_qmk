name: Build firmware

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout vial-qmk
              uses: actions/checkout@v4
              with:
                  repository: vial-kb/vial-qmk
                  ref: vial

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install ARM and AVR toolchain
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi gcc-avr binutils-avr avr-libc

            - name: Install Python dependencies
              run: |
                  uv venv
                  uv pip install -r requirements.txt qmk

            # 1. RP2040 (main branch)
            - name: Checkout poti48 (RP2040)
              uses: actions/checkout@v4
              with:
                  path: keyboards/poti48

            - name: Build RP2040 firmware
              run: |
                  uv run --no-project make poti48:vial
                  mv .build/poti48_vial.uf2 ./poti48_vial_rp2040.uf2

            - name: Clean up for ProMicro checkout
              run: |
                  rm -rf keyboards/poti48

            # 2. Pro Micro (promicro branch)
            - name: Checkout poti48 (ProMicro)
              uses: actions/checkout@v4
              with:
                  ref: promicro
                  path: temp_promicro

            # 2-1. Pro Micro Right (poti48 folder, PS/2 enabled)
            - name: Setup ProMicro Right
              run: |
                  mv temp_promicro/poti48 keyboards/poti48

            - name: Build ProMicro Right firmware
              run: |
                  uv run --no-project make poti48:vial
                  if [ -f .build/poti48_vial.hex ]; then
                    mv .build/poti48_vial.hex ./poti48_vial_promicro_right.hex
                  fi
                  rm -rf keyboards/poti48

            # 2-2. Pro Micro Left (poti48_L folder, PS/2 disabled)
            - name: Setup ProMicro Left
              run: |
                  mv temp_promicro/poti48_L keyboards/poti48_l

            - name: Build ProMicro Left firmware
              run: |
                  uv run --no-project make poti48_l:vial
                  if [ -f .build/poti48_l_vial.hex ]; then
                    mv .build/poti48_l_vial.hex ./poti48_vial_promicro_left.hex
                  fi
                  rm -rf keyboards/poti48_l

            # 3. Artifact Upload
            - name: Upload RP2040 firmware
              uses: actions/upload-artifact@v4
              with:
                  name: poti48_vial_rp2040
                  path: ./poti48_vial_rp2040.uf2

            - name: Upload ProMicro Right firmware
              uses: actions/upload-artifact@v4
              with:
                  name: poti48_vial_promicro_right
                  path: ./poti48_vial_promicro_right.hex

            - name: Upload ProMicro Left firmware
              uses: actions/upload-artifact@v4
              with:
                  name: poti48_vial_promicro_left
                  path: ./poti48_vial_promicro_left.hex

    release:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Create artifacts directory
              run: mkdir ./artifacts

            - name: Download RP2040 artifact
              uses: actions/download-artifact@v4
              with:
                  name: poti48_vial_rp2040
                  path: ./artifacts

            - name: Download ProMicro Right artifact
              uses: actions/download-artifact@v4
              with:
                  name: poti48_vial_promicro_right
                  path: ./artifacts

            - name: Download ProMicro Left artifact
              uses: actions/download-artifact@v4
              with:
                  name: poti48_vial_promicro_left
                  path: ./artifacts

            - name: Update latest release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release delete latest --yes || true
                  gh release create latest \
                    --prerelease \
                    --title "Latest Builds" \
                    --notes "Automated builds for RP2040 and Pro Micro (Left/Right)."
                  
                  gh release upload latest \
                    ./artifacts/* \
                    --repo ${{ github.repository }} \
                    --clobber
