name: Build firmware

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    release:
        types: [published]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout vial-qmk
              uses: actions/checkout@v4
              with:
                  repository: vial-kb/vial-qmk
                  ref: vial

            - name: Checkout poti48
              uses: actions/checkout@v4
              with:
                  path: keyboards/poti48

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install ARM toolchain
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

            - name: Install Python dependencies
              run: |
                  uv venv
                  uv pip install -r requirements.txt qmk

            - name: Build firmware (vial keymap)
              run: uv run --no-project make poti48:vial

            - name: Upload UF2 artifact
              uses: actions/upload-artifact@v4
              with:
                  name: poti48_vial
                  path: .build/poti48_vial.uf2

    release:
        if: github.event_name == 'release'
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: poti48_vial

            - name: Upload to Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release upload ${{ github.event.release.tag_name }} \
                    poti48_vial.uf2 \
                    --repo ${{ github.repository }}
